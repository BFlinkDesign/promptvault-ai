# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
#
# Copy to a target repo root as `.coderabbit.yaml` only when CodeRabbit remains
# installed for that repo. This template keeps CodeRabbit quiet unless requested,
# avoiding paid-review/status noise while deterministic CI stays the merge gate.
#
# Start from defaults: open any PR and comment `@coderabbitai configuration`,
# then merge the pieces you want from this file.
language: "en-US"
early_access: false

reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: false
  review_details: false
  commit_status: true
  fail_commit_status: false
  collapse_walkthrough: true
  changed_files_summary: true
  sequence_diagrams: false
  estimated_effort: false
  related_issues: false
  related_prs: false
  suggested_labels: false
  auto_apply_labels: false
  suggested_reviewers: false
  auto_assign_reviewers: false
  abort_on_close: true

  auto_review:
    enabled: false
    description_keyword: "@coderabbitai review"
    auto_incremental_review: true
    auto_pause_after_reviewed_commits: 12
    drafts: false
    ignore_title_keywords:
      - "WIP"
      - "[skip review]"
      - "chore(deps)"
      - "chore(deps-dev)"
    labels:
      - "!do-not-review"
      - "!automation"
    base_branches: []

  # Automatic mode (uncomment only for repos that still want CodeRabbit on every PR):
  # auto_review:
  #   enabled: true
  #   drafts: false
  #
  # Label-gated mode (only PRs tagged `needs-review`):
  # auto_review:
  #   enabled: true
  #   labels: ["needs-review"]
